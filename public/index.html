<!-- public/index.html -->

<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>YouTube Downloader</title>

<style>

body{
    margin:0;
    padding:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:90%;
    max-width:400px;
    background:#1d1d1d;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px red;
}

h1{
    color:red;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#cc0000;
}

</style>

</head>

<body>

<div class="box">

<h1>YouTube Downloader</h1>

<input
type="text"
id="url"
placeholder="Paste YouTube URL"
>

<button onclick="download('mp4')">
Download MP4
</button>

<button onclick="download('mp3')">
Download MP3
</button>

</div>

<script>

function download(format){

    const url =
    document.getElementById("url").value;

    if(!url){
        alert("Paste YouTube URL");
        return;
    }

    window.location =
    `/download?url=${encodeURIComponent(url)}&format=${format}`;
}

</script>

</body>
</html>
